name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  JAVA_VERSION: '25'
  NODE_VERSION: '22'

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos-arm64
          - os: ubuntu-22.04
            platform: linux-x64
          - os: windows-2022
            platform: windows-x64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install SEA build tools
        run: npm install -g esbuild postject

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # Sidecars SEA (Node.js Single Executable Applications)
      # ---------------------------------------------------------------
      - name: Install sidecar dependencies
        shell: bash
        run: |
          for sidecar in telegram whatsapp discord imessage; do
            echo "::group::npm install fararoni-sidecar-$sidecar"
            (cd "fararoni-sidecar-$sidecar" && npm install --production)
            echo "::endgroup::"
          done

      - name: Build sidecars as SEA binaries
        shell: bash
        run: |
          set -e

          OUTPUT_DIR="fararoni-distribution/target/sidecars"
          NODE_PATH="$(node -e "process.stdout.write(process.execPath)")"
          mkdir -p "$OUTPUT_DIR"

          EXE=""
          [[ "$RUNNER_OS" == "Windows" ]] && EXE=".exe"

          for name in telegram whatsapp discord imessage; do
            echo "::group::sidecar-$name"
            cd "fararoni-sidecar-$name"
            mkdir -p dist

            # 1. Bundle
            npx esbuild index.js --bundle --platform=node --target=node20 \
              --format=cjs --outfile=dist/bundle.js --minify --tree-shaking=true

            # 2. SEA blob
            echo '{"main":"dist/bundle.js","output":"dist/sea-prep.blob","disableExperimentalSEAWarning":true}' > dist/sea-config.json
            node --experimental-sea-config dist/sea-config.json

            # 3. Copy node binary
            cp "$NODE_PATH" "dist/sidecar-${name}${EXE}"
            chmod u+w "dist/sidecar-${name}${EXE}" 2>/dev/null || true

            # 4. Remove signature (macOS only)
            if [[ "$RUNNER_OS" == "macOS" ]]; then
              codesign --remove-signature "dist/sidecar-${name}${EXE}" 2>/dev/null || true
            fi

            # 5. Inject SEA blob
            EXTRA=""
            [[ "$RUNNER_OS" == "macOS" ]] && EXTRA="--macho-segment-name NODE_SEA"
            npx postject "dist/sidecar-${name}${EXE}" \
              NODE_SEA_BLOB dist/sea-prep.blob \
              --sentinel-fuse NODE_SEA_FUSE_fce680ab2cc467b6e072b8b5df1996b2 \
              $EXTRA --overwrite

            # 6. Re-sign (macOS only)
            if [[ "$RUNNER_OS" == "macOS" ]]; then
              codesign --sign - "dist/sidecar-${name}${EXE}" 2>/dev/null || true
            fi

            # 7. Copy to output
            cp "dist/sidecar-${name}${EXE}" "../$OUTPUT_DIR/"
            chmod 755 "../$OUTPUT_DIR/sidecar-${name}${EXE}" 2>/dev/null || true

            rm -rf dist
            cd ..
            echo "::endgroup::"
          done

          echo "Sidecars built:"
          ls -lh "$OUTPUT_DIR/"

      # ---------------------------------------------------------------
      # Maven — compila core + gateway + enterprise + distribution
      # ---------------------------------------------------------------
      - name: Maven package
        run: mvn package -DskipTests -Dmaven.javadoc.skip=true -B

      # ---------------------------------------------------------------
      # Renombrar artefactos con plataforma
      # ---------------------------------------------------------------
      - name: Prepare release artifacts
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PLATFORM="${{ matrix.platform }}"
          mkdir -p release

          cd fararoni-distribution/target

          # ZIP
          if [[ -f "fararoni-v${VERSION}.zip" ]]; then
            cp "fararoni-v${VERSION}.zip" "../../release/fararoni-v${VERSION}-${PLATFORM}.zip"
          fi

          # TAR.GZ
          if [[ -f "fararoni-v${VERSION}.tar.gz" ]]; then
            cp "fararoni-v${VERSION}.tar.gz" "../../release/fararoni-v${VERSION}-${PLATFORM}.tar.gz"
          fi

      # ---------------------------------------------------------------
      # DMG (solo macOS)
      # ---------------------------------------------------------------
      - name: Create DMG
        if: runner.os == 'macOS'
        run: |
          chmod +x fararoni-distribution/create-dmg.sh
          cd fararoni-distribution && zsh create-dmg.sh
          PLATFORM="${{ matrix.platform }}"
          cp target/Fararoni-Installer.dmg ../release/Fararoni-Installer-${PLATFORM}.dmg

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fararoni-${{ matrix.platform }}
          path: release/*
          if-no-files-found: warn

  # =================================================================
  # Release — descarga artefactos de las 3 plataformas y publica
  # =================================================================
  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: ls -lhR artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
