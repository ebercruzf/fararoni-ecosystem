# ═══════════════════════════════════════════════════════════════════════════
# MISSION: DEFCON 5 - Flujo Simple (4 agentes)
# FASE 55.3 - Sistema de Misiones Enterprise
# ═══════════════════════════════════════════════════════════════════════════
#
# Uso: Tareas simples, scripts de un archivo, "Hola Mundo"
# Agentes: COMMANDER → BLUEPRINT → BUILDER → OPERATOR
# Omite: INTEL, STRATEGIST, SENTINEL (para acelerar)
#
# ═══════════════════════════════════════════════════════════════════════════

missionId: defcon5-simple
name: "DEFCON 5 - Desarrollo Rápido"
description: "Flujo simplificado para tareas de baja complejidad"
maxIterations: 5

# ═══════════════════════════════════════════════════════════════════════════
# PASO INICIAL
# ═══════════════════════════════════════════════════════════════════════════
initialStepId: receive_request

# ═══════════════════════════════════════════════════════════════════════════
# PASOS DEL FLUJO DAG
# ═══════════════════════════════════════════════════════════════════════════
steps:
  # ─────────────────────────────────────────────────────────────────────────
  # PASO 1: Commander recibe y analiza la solicitud
  # ─────────────────────────────────────────────────────────────────────────
  receive_request:
    requiredCapability: coordination
    systemPromptOverride: |
      Analiza la siguiente solicitud del usuario y extrae:
      1. Objetivo principal
      2. Requisitos funcionales
      3. Criterios de aceptación
      4. Prioridad y urgencia

      Formatea como especificación técnica para el equipo de desarrollo.
    transitions:
      success: design_blueprint
      failure: end_failure

  # ─────────────────────────────────────────────────────────────────────────
  # PASO 2: Blueprint diseña la arquitectura (sin validación estratégica)
  # ─────────────────────────────────────────────────────────────────────────
  design_blueprint:
    requiredCapability: technical_design
    systemPromptOverride: |
      Diseña la arquitectura técnica para estos requisitos.
      Como es DEFCON 5, asume que es viable y no requiere patrones complejos.

      FORMATO DE SALIDA REQUERIDO (ESTRICTO):

      1. PRIMERO: Define el nombre del proyecto y la estructura de archivos:

      Blueprint: <Nombre descriptivo del proyecto>
      ├── <ruta/archivo1>
      ├── <ruta/archivo2>
      └── <ruta/archivoN>

      2. LUEGO: Para cada archivo, usa este bloque detallado:

      FILE: <ruta_relativa_exacta>
      PLAN: <instrucciones de implementación detalladas>

      REGLAS:
      - NO inventes paquetes como `com.example`. Usa un nombre basado en el proyecto.
      - Usa convenciones del lenguaje (Java: src/main/java/..., Python: /, etc.)
      - Define TODOS los archivos necesarios.

      EJEMPLO COMPLETO:
      Blueprint: Microservicio de Gestión de Alumnos
      ├── src/main/java/com/gestion/modelo/Alumno.java
      ├── src/main/java/com/gestion/repository/AlumnoRepository.java
      ├── src/main/java/com/gestion/service/AlumnoService.java
      └── src/main/java/com/gestion/controller/AlumnoController.java

      FILE: src/main/java/com/gestion/modelo/Alumno.java
      PLAN: Crear entidad JPA con campos id, nombre, email, edad. Usar @Entity, @Id, @GeneratedValue.

      FILE: src/main/java/com/gestion/repository/AlumnoRepository.java
      PLAN: Interface que extiende JpaRepository<Alumno, Long>.

      El BUILDER debe poder implementar directamente desde tu especificación.
    transitions:
      success: implement_code
      failure: end_failure

  # ─────────────────────────────────────────────────────────────────────────
  # PASO 3: Builder implementa el código (sin revisión Sentinel)
  # ─────────────────────────────────────────────────────────────────────────
  implement_code:
    requiredCapability: code_generation
    systemPromptOverride: |
      TIENES UN BLUEPRINT TÉCNICO del paso anterior.
      Como es DEFCON 5, escribe directamente sin esperar revisión.

      TU TAREA:
      Escribir el código completo y funcional para CADA archivo definido en el Blueprint.

      PROTOCOLO DE SALIDA (MULTI-ARCHIVO):
      Debes entregar el contenido de los archivos usando este formato separador EXACTO:

      >>>FILE: <ruta_del_archivo>
      <contenido_del_codigo>

      REGLAS:
      1. Si el Blueprint pide múltiples archivos, genera un bloque >>>FILE: para cada uno.
      2. El código debe estar completo (imports, clases, métodos).
      3. No incluyas markdown (```java) dentro del bloque, solo el código puro.
      4. RESPETA las rutas exactas que indica el Blueprint.
      5. Si solo hay un archivo, aún así usa el formato >>>FILE:.

      EJEMPLO:
      >>>FILE: src/main/java/com/miproyecto/modelo/Alumno.java
      package com.miproyecto.modelo;

      import jakarta.persistence.*;

      @Entity
      public class Alumno {
          @Id
          @GeneratedValue(strategy = GenerationType.IDENTITY)
          private Long id;
          private String nombre;
          // getters y setters completos
      }
    transitions:
      success: verify_deployment
      failure: rollback_code

  # ─────────────────────────────────────────────────────────────────────────
  # PASO 4: Operator verifica el despliegue
  # ─────────────────────────────────────────────────────────────────────────
  verify_deployment:
    requiredCapability: deployment_verification
    systemPromptOverride: |
      Verifica que los archivos existan en disco.
      Aplica autocuración si es necesario.
      Certifica el despliegue o reporta fallo.
    transitions:
      success: audit_close
      failure: rollback_code

  # ─────────────────────────────────────────────────────────────────────────
  # PASO 5: Notary registra cierre de misión (FASE 58.4)
  # ─────────────────────────────────────────────────────────────────────────
  audit_close:
    requiredCapability: audit_logging
    systemPromptOverride: |
      REGISTRO FINAL DE MISIÓN:
      Registra el cierre exitoso de esta misión.
      Formato: [AUDIT-LOG] <Timestamp> | <CorrelationId> | MISSION_COMPLETE | SUCCESS
      Incluye un Hash de Integridad del trabajo realizado.
    transitions:
      success: end_success
      failure: end_success  # Auditoría falla silenciosamente, no bloquea

  # ─────────────────────────────────────────────────────────────────────────
  # PASO DE COMPENSACIÓN: Rollback del código
  # ─────────────────────────────────────────────────────────────────────────
  rollback_code:
    requiredCapability: code_generation
    compensationStep: true
    systemPromptOverride: |
      COMPENSACIÓN: Elimina todos los archivos creados en esta ejecución.
      Reporta los archivos eliminados al Commander.
    transitions:
      success: end_rollback
      failure: end_failure

# ═══════════════════════════════════════════════════════════════════════════
# CONFIGURACIÓN DEFCON
# ═══════════════════════════════════════════════════════════════════════════
defconLevel: 5
agentsRequired:
  - commander
  - blueprint
  - builder
  - operator

agentsOptional:
  - notary  # FASE 58.4: Auditoría opcional

# ═══════════════════════════════════════════════════════════════════════════
# TIMEOUT Y REINTENTOS
# ═══════════════════════════════════════════════════════════════════════════
timeoutPerStep: 30000  # 30 segundos por paso
maxRetries: 2

# ═══════════════════════════════════════════════════════════════════════════
# NOTAS DE DISEÑO
# ═══════════════════════════════════════════════════════════════════════════
# - Este flujo omite INTEL, STRATEGIST y SENTINEL para velocidad
# - Ideal para: scripts simples, ejemplos, tareas de un solo archivo
# - NO usar para: sistemas de producción, autenticación, pagos
# ═══════════════════════════════════════════════════════════════════════════
