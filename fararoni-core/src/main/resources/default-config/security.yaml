# ═══════════════════════════════════════════════════════════════════
# CONFIGURACION DE SEGURIDAD - FARARONI FASE 45
# ═══════════════════════════════════════════════════════════════════
#
# Este archivo define el control de acceso para canales externos
# (WhatsApp, Telegram, Matrix).
#
# Ubicacion: ~/.fararoni/config/security.yaml
# ═══════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════
# VARIABLES DE ENTORNO REQUERIDAS PARA PRODUCCION
# ═══════════════════════════════════════════════════════════════════
#
# FARARONI_DEV_MODE=false (default)
#   Modo produccion. Requiere encryption key para canales OmniChannel.
#   Para desarrollo: export FARARONI_DEV_MODE=true
#
# FARARONI_CHANNELS_ENCRYPTION_KEY (requerida si usas WhatsApp/Telegram/Discord)
#   Clave AES-256 para cifrar tokens y credenciales de canales en la DB.
#   Generar: openssl rand -base64 32
#   Ejemplo: export FARARONI_CHANNELS_ENCRYPTION_KEY="K7x2mP...base64..."
#
# FARARONI_CHANNELS_KEY_ID (opcional, default: "default")
#   Identificador de la clave. Util para rotacion de claves.
#
# FARARONI_ENV (opcional, default: "development")
#   Controla el tipo de bus de mensajes interno:
#   - "development" / "dev" : Bus volatil (in-memory)
#   - "production" / "prod" : Bus persistente
#
# FARARONI_DEBUG (opcional)
#   Activa logs verbosos en CLI: export FARARONI_DEBUG=true
#
# RESUMEN RAPIDO:
#   # Produccion con canales OmniChannel (WhatsApp, Telegram):
#   export FARARONI_CHANNELS_ENCRYPTION_KEY="$(openssl rand -base64 32)"
#   export FARARONI_ENV=production
#   java --enable-preview -jar fararoni-core-1.0.0.jar --server
#
#   # Desarrollo local (sin encryption):
#   export FARARONI_DEV_MODE=true
#   java --enable-preview -jar fararoni-core-1.0.0.jar --server
# ═══════════════════════════════════════════════════════════════════

security:
  # ─────────────────────────────────────────────────────────────────
  # OWNER: Propietario del sistema con acceso total
  # ─────────────────────────────────────────────────────────────────
  owner: "+521234567890"

  # ─────────────────────────────────────────────────────────────────
  # ALLOWLIST: Contactos autorizados
  # Formato WhatsApp: +521234567890
  # Formato Matrix: @user:server.com
  # ─────────────────────────────────────────────────────────────────
  allowlist:
    - id: "+521111111111"
      note: "Cliente VIP"
    - id: "+522222222222"
      note: "Soporte Tecnico"
    # - id: "@admin:matrix.local"
    #   note: "Admin Matrix"

  # ─────────────────────────────────────────────────────────────────
  # GROUPS: Grupos autorizados
  # Formato WhatsApp: 120363XXXXXXXXXX@g.us
  # Formato Matrix: !roomid:server.com
  # ─────────────────────────────────────────────────────────────────
  groups:
    # - id: "120363123456789012345@g.us"
    #   note: "Grupo Ventas"
    # - id: "!abc123:matrix.local"
    #   note: "Sala Comandos"

  # ─────────────────────────────────────────────────────────────────
  # PAIRING: Configuracion de emparejamiento
  # ─────────────────────────────────────────────────────────────────
  pairing:
    # Maximo de solicitudes pendientes simultaneas
    max_pending: 3

    # Horas hasta que expira un codigo de pairing
    expiry_hours: 1

    # Auto-aprobar contactos que esten en la lista del owner
    # (Solo aplica si el canal soporta leer contactos)
    auto_approve_owner_contacts: false
